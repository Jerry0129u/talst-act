<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Гүйцэтгэлийн Акт — Talst Group</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;
  --surface:#ffffff;
  --surface2:#f9f8f5;
  --border:#e8e6df;
  --border2:#d8d6cf;
  --text:#1a1915;
  --text2:#6b6960;
  --text3:#a8a59e;
  --accent:#1a1915;
  --green:#1d7a5f;
  --green-bg:#edf7f3;
  --green-border:#b8ddd3;
  --amber:#8a6200;
  --amber-bg:#fef6e4;
  --amber-border:#f0d090;
  --blue:#1a4fa0;
  --blue-bg:#eef3fd;
  --blue-border:#b0c8f0;
  --red:#991c1c;
  --red-bg:#fef1f1;
  --red-border:#f0c0c0;
  --r:10px;--r2:6px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased}

/* LOGIN */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px 40px;max-width:380px;width:100%;text-align:center}
.auth-logo{width:52px;height:52px;background:var(--text);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
.auth-logo img{height:32px;object-fit:contain;filter:invert(1) brightness(2)}
.auth-h{font-size:20px;font-weight:600;letter-spacing:-.3px;margin-bottom:6px}
.auth-sub{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:32px}
.btn-google{width:100%;padding:12px 20px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2);font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .15s;color:var(--text);font-family:inherit}
.btn-google:hover{background:var(--surface2);border-color:var(--border2)}
.auth-note{font-size:11px;color:var(--text3);margin-top:20px;line-height:1.6}

/* LAYOUT */
.app{display:none;min-height:100vh;flex-direction:column}
.app.show{display:flex}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:54px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.logo-mark{width:30px;height:30px;background:var(--text);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-mark img{height:18px;filter:invert(1) brightness(2)}
.logo-name{font-size:13px;font-weight:600;letter-spacing:-.1px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.role-tag{font-size:11px;font-weight:500;color:var(--text2);background:var(--surface2);border:1px solid var(--border);padding:3px 8px;border-radius:20px}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--text);color:#fff;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;cursor:pointer;letter-spacing:.5px}

/* NAV */
.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0}
.nav::-webkit-scrollbar{display:none}
.nav-item{padding:0 4px;height:44px;display:flex;align-items:center;position:relative;cursor:pointer;flex-shrink:0}
.nav-btn{font-size:13px;font-weight:500;color:var(--text2);padding:6px 12px;border-radius:var(--r2);border:none;background:none;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.nav-item.on .nav-btn{color:var(--text);background:var(--surface2)}
.nav-item.on::after{content:'';position:absolute;bottom:0;left:12px;right:12px;height:2px;background:var(--text);border-radius:2px 2px 0 0}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:20px}
.wrap{max-width:680px;margin:0 auto}

/* TOAST */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);z-index:999;padding:10px 16px;border-radius:var(--r2);font-size:13px;font-weight:500;white-space:nowrap;display:none;animation:slideDown .2s ease}
@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.toast.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.toast.err{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}

/* FORM */
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:12px}
.section-title{font-size:13px;font-weight:600;letter-spacing:.2px;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section-title .icon{width:28px;height:28px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px}
.field{margin-bottom:14px}
.field-label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;display:block}
.field input,.field textarea,.field select{width:100%;font-size:13px;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r2);background:var(--surface2);color:var(--text);outline:none;transition:border .15s;font-family:inherit}
.field input:focus,.field textarea:focus{border-color:var(--text);background:var(--surface)}
.field textarea{height:72px;resize:none;line-height:1.5}
.date-row{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center}
.date-sep{font-size:12px;color:var(--text3);text-align:center}
.amount-display{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--text);margin-top:5px;min-height:20px}
.file-zone{border:1px dashed var(--border2);border-radius:var(--r2);padding:16px;text-align:center;cursor:pointer;transition:all .15s;background:var(--surface2)}
.file-zone:hover{border-color:var(--text);background:var(--surface)}
.file-zone-label{font-size:12px;color:var(--text2)}
.file-zone-sub{font-size:11px;color:var(--text3);margin-top:2px}
.file-list{margin-top:10px;display:flex;flex-direction:column;gap:4px}
.file-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r2);font-size:12px}
.file-item-icon{font-size:14px;flex-shrink:0}
.file-item-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);font-weight:500}
.file-item-size{color:var(--text3);flex-shrink:0}
.file-item-rm{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:14px;flex-shrink:0;background:none;border:none}
.file-item-rm:hover{background:var(--red-bg);color:var(--red)}
.submit-btn{width:100%;padding:12px;background:var(--text);color:#fff;border:none;border-radius:var(--r2);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s;margin-top:4px}
.submit-btn:hover{opacity:.85}
.submit-btn:disabled{opacity:.4;cursor:not-allowed}
.progress-wrap{height:2px;background:var(--border);border-radius:1px;margin-top:10px;overflow:hidden;display:none}
.progress-bar{height:100%;background:var(--text);border-radius:1px;transition:width .4s}
.progress-label{font-size:11px;color:var(--text3);margin-top:4px;display:none}

/* ACT CARDS */
.act-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.act-card:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.act-card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
.act-card-id{font-size:10px;font-weight:500;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:3px}
.act-card-title{font-size:14px;font-weight:500;color:var(--text);line-height:1.3}
.act-card-meta{font-size:12px;color:var(--text2);margin-bottom:10px}
.act-card-footer{display:flex;align-items:center;gap:10px}
.progress-mini{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-mini-bar{height:100%;background:var(--green);border-radius:2px;transition:width .4s}
.progress-pct{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;min-width:32px;text-align:right}
.badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;white-space:nowrap;letter-spacing:.2px;flex-shrink:0}
.badge-pending{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.badge-done{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.badge-rejected{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.badge-waiting{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}

/* DETAIL */
.back-btn{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--text2);cursor:pointer;margin-bottom:14px;padding:4px 0;border:none;background:none;font-family:inherit}
.back-btn:hover{color:var(--text)}
.back-arrow{font-size:16px}
.detail-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.detail-head{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.detail-id{font-size:10px;font-weight:500;font-family:'DM Mono',monospace;color:var(--text3);margin-bottom:4px}
.detail-title{font-size:15px;font-weight:600;line-height:1.3}
.detail-body{padding:16px 18px}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.info-row:last-child{border:none}
.info-label{color:var(--text2)}
.info-value{font-weight:500;text-align:right;max-width:60%}
.amount-big{font-family:'DM Mono',monospace;font-size:18px;font-weight:600;color:var(--text)}
.img-section{padding:14px 18px;border-top:1px solid var(--border)}
.img-section-label{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.5px;margin-bottom:10px}
.img-grid{display:flex;flex-wrap:wrap;gap:6px}
.img-thumb{width:72px;height:72px;border-radius:6px;object-fit:cover;cursor:pointer;border:1px solid var(--border)}
.pdf-thumb{width:72px;height:72px;border-radius:6px;border:1px solid var(--red-border);background:var(--red-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer}
.pdf-thumb span{font-size:20px}
.pdf-thumb small{font-size:9px;color:var(--red);font-weight:600;margin-top:2px;text-align:center;padding:0 3px;word-break:break-all;max-height:24px;overflow:hidden}
.progress-section{padding:14px 18px;border-top:1px solid var(--border)}
.progress-big{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:6px}
.progress-big-bar{height:100%;background:var(--green);border-radius:2px;transition:width .6s}
.progress-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.approve-section{padding:14px 18px;border-top:1px solid var(--border);display:flex;gap:10px}
.btn-approve{flex:1;padding:11px;background:var(--text);color:#fff;border:none;border-radius:var(--r2);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn-approve:hover{opacity:.8}
.btn-reject{padding:11px 16px;background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);border-radius:var(--r2);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-reject:hover{background:var(--red);color:#fff}

/* TIMELINE */
.timeline{padding:14px 18px;border-top:1px solid var(--border)}
.tl-label{font-size:10px;font-weight:600;letter-spacing:.8px;color:var(--text3);margin-bottom:14px}
.tl-item{display:flex;gap:12px;margin-bottom:0}
.tl-spine{display:flex;flex-direction:column;align-items:center;width:28px;flex-shrink:0}
.tl-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;z-index:1}
.tl-dot.done-dot{background:var(--green-bg);color:var(--green);border:1.5px solid var(--green-border)}
.tl-dot.active-dot{background:var(--blue-bg);color:var(--blue);border:1.5px solid var(--blue-border)}
.tl-dot.wait-dot{background:var(--surface2);color:var(--text3);border:1px solid var(--border)}
.tl-dot.reject-dot{background:var(--red-bg);color:var(--red);border:1.5px solid var(--red-border)}
.tl-line{flex:1;width:1px;background:var(--border);min-height:12px;margin-bottom:0}
.tl-body{flex:1;padding-bottom:16px}
.tl-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r2);padding:10px 12px}
.tl-card.active-card{border-color:var(--blue-border);background:var(--blue-bg)}
.tl-card.reject-card{border-color:var(--red-border);background:var(--red-bg)}
.tl-who{font-size:10px;color:var(--text3);margin-bottom:2px}
.tl-title{font-size:12px;font-weight:600;color:var(--text)}
.tl-title.reject-title{color:var(--red)}
.tl-title.done-title{color:var(--green)}
.tl-detail{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.5}
.tl-hash{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:5px;padding-top:5px;border-top:1px solid var(--border);word-break:break-all}
.tl-wait-card{background:var(--surface2);border:1px dashed var(--border2);border-radius:var(--r2);padding:10px 12px;opacity:.55}

/* DASHBOARD */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center}
.stat-num{font-size:26px;font-weight:600;font-family:'DM Mono',monospace;letter-spacing:-1px}
.stat-label{font-size:10px;font-weight:500;color:var(--text3);margin-top:2px;letter-spacing:.3px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px}
.chart-title{font-size:11px;font-weight:600;letter-spacing:.5px;color:var(--text3);margin-bottom:14px}

/* EMPTY */
.empty{text-align:center;padding:48px 24px;color:var(--text3)}
.empty-icon{font-size:32px;margin-bottom:10px;display:block}
.empty-text{font-size:14px}

/* LIGHTBOX */
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;align-items:center;justify-content:center}
.lb.open{display:flex}
.lb img{max-width:90vw;max-height:88vh;border-radius:8px;object-fit:contain}
.lb-x{position:fixed;top:18px;right:20px;color:#fff;font-size:24px;cursor:pointer;opacity:.7;border:none;background:none}
.lb-x:hover{opacity:1}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:48px;gap:10px;color:var(--text3);font-size:13px}
.spin{width:14px;height:14px;border:1.5px solid var(--border2);border-top-color:var(--text2);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

const e=id=>document.getElementById(id);
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function ts(){return new Date().toLocaleString('mn-MN')}
function gh(){return Math.random().toString(36).substr(2,6)+'...'+Math.random().toString(36).substr(2,4)}
function pct(a){return a.status==='done'?100:Math.round((a.step||0)/4*100)}
function fmtN(n){return parseInt(n||0).toLocaleString('mn-MN')}

function badgeCls(a){
  if(a.status==='done')return 'badge-done';
  if(a.status==='rejected')return 'badge-rejected';
  if((a.step||0)===0)return 'badge-pending';
  return 'badge-waiting';
}
function badgeTxt(a){
  if(a.status==='done')return '✓ Батлагдсан';
  if(a.status==='rejected')return '✕ Буцаагдсан';
  return SN[a.step||0]+' хүлээж байна';
}

window.fmtAmt=()=>{
  const v=e('fa').value;
  e('amtFmt').textContent=v&&!isNaN(v)?'₮ '+parseInt(v).toLocaleString('mn-MN'):'';
};

function readFile(file){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      const b64=ev.target.result;
      const kb=Math.round(file.size/1024);
      const isPdf=file.type==='application/pdf';
      resolve({name:file.name,base64:b64,sizeKb:kb,isPdf});
    };
    reader.readAsDataURL(file);
  });
}

window.addImgs=async(input)=>{
  const files=Array.from(input.files);
  if(!files.length)return;
  for(const f of files){
    const d=await readFile(f);
    imgDataList.push(d);
  }
  renderFileList();
  input.value='';
};

function renderFileList(){
  const el=e('fileList');
  el.innerHTML=imgDataList.map((d,i)=>`
    <div class="file-item">
      <span class="file-item-icon">${d.isPdf?'📄':'🖼'}</span>
      <span class="file-item-name">${esc(d.name)}</span>
      <span class="file-item-size">${d.sizeKb}KB</span>
      <button class="file-item-rm" onclick="rmFile(${i})">✕</button>
    </div>`).join('');
}

window.rmFile=(i)=>{imgDataList.splice(i,1);renderFileList();};
window.openLb=(src)=>{e('lbImg').src=src;e('lb').classList.add('open')};
window.closeLb=()=>e('lb').classList.remove('open');

function toast(m,t='ok'){
  const el=e('toast');el.textContent=m;
  el.className='toast '+(t==='ok'?'ok':'err');
  el.style.display='block';
  setTimeout(()=>el.style.display='none',4000);
}

function sendMail(toEmail,toName,act,fromName){
  const params={
    to_email:toEmail,to_name:toName,
    company:act.company,contract:act.contract,
    work:act.work,amount:fmtN(act.amount),
    from_name:fromName,email:toEmail,name:fromName,
  };
  return emailjs.send(EJS_SVC,EJS_TPL,params)
    .then(r=>console.log('Email sent:',r))
    .catch(err=>console.error('EmailJS error:',err));
}

  if(confirm('Системээс гарах уу?')){if(unsub)unsub();await fbOut(auth)}
};
window.go=go;window.bk=bk;window.opd=opd;
window.submitAct=submitAct;window.approve=approve;window.reject=reject;

onAuthStateChanged(auth,u=>{
  if(u){
    cu=u;role=ROLES[u.email]||'Гүйцэтгэгч';
    e('loginPage').style.display='none';
    e('appPage').classList.add('show');
    e('roleTag').textContent=role;
    const name=u.displayName||u.email;
    const parts=name.split(/[\s.]+/).filter(Boolean);
    const ini=(parts.length>=2?parts[0][0]+parts[1][0]:name.replace(/@.*/,'').substr(0,2)).toUpperCase();
    e('uav').textContent=ini;
    listen();
  }else{
    cu=null;
    e('loginPage').style.display='flex';
    e('appPage').classList.remove('show');
    if(unsub){unsub();unsub=null;}
  }
});

function listen(){
  const q=query(collection(db,'acts'),orderBy('createdAt','desc'));
  unsub=onSnapshot(q,snap=>{
    acts=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(ctab===1)rA();if(ctab===2)rL();if(ctab===3)rD();
    if(e('pd').style.display!=='none'){
      const idx=parseInt(e('dc').dataset.idx||'-1');
      if(idx>=0&&acts[idx])e('dc').innerHTML=detH(idx);
    }
  });
}

function go(n){
  [0,1,2,3].forEach(i=>{e('p'+i).style.display='none';e('tb'+i).classList.remove('on')});
  e('pd').style.display='none';
  e('p'+n).style.display='block';e('tb'+n).classList.add('on');
  ctab=n;
  if(n===1)rA();if(n===2)rL();if(n===3)rD();
}
function bk(){
  e('pd').style.display='none';
  e('p'+prev).style.display='block';e('tb'+prev).classList.add('on');
  ctab=prev;
}
function opd(idx,from){
  prev=from;
  [0,1,2,3].forEach(i=>{e('p'+i).style.display='none';e('tb'+i).classList.remove('on')});
  e('pd').style.display='block';
  e('dc').dataset.idx=idx;
  e('dc').innerHTML=detH(idx);
}

async function submitAct(){
  const c=e('fc').value.trim(),g=e('fg').value.trim(),w=e('fw').value.trim(),a=e('fa').value.trim();
  if(!c||!g||!w||!a){toast('Компани, гэрээ, ажил, дүн заавал!','err');return;}
  const totalKb=imgDataList.reduce((s,x)=>s+x.sizeKb,0);
  if(totalKb>800){toast(`Нийт ${totalKb}KB — 800KB-аас хэтрэх боломжгүй`,'err');return;}

  const btn=e('sbtn');btn.disabled=true;btn.textContent='Илгээж байна...';
  e('progWrap').style.display='block';e('progText').style.display='block';
  e('progBar').style.width='20%';e('progText').textContent='Бэлдэж байна...';

  const aid='АКТ-'+new Date().getFullYear()+'-'+String(Date.now()).substr(-4);
  try{
    e('progBar').style.width='60%';e('progText').textContent='Хадгалж байна...';
    const actData={
      actId:aid,date:new Date().toLocaleDateString('mn-MN'),
      company:c,contract:g,work:w,
      dateFrom:e('fd1').value,dateTo:e('fd2').value,amount:a,
      images:imgDataList.map(d=>({name:d.name,base64:d.base64,sizeKb:d.sizeKb,isPdf:d.isPdf})),
      imgCount:imgDataList.length,step:0,status:'pending',
      submittedBy:cu.email,submittedByName:cu.displayName||cu.email,
      createdAt:serverTimestamp(),
      evs:[{type:'submit',who:cu.displayName||cu.email,whoEmail:cu.email,
        title:'Акт илгээсэн',detail:c+' · '+g+' · ₮'+fmtN(a),time:ts(),hash:gh()}]
    };
    await addDoc(collection(db,'acts'),actData);
    e('progBar').style.width='85%';e('progText').textContent='Email илгээж байна...';
    await sendMail(CHAIN[0].email,CHAIN[0].name,actData,cu.displayName||cu.email);
    e('progBar').style.width='100%';
    toast('✓ Акт илгээгдлээ — координаторт мэдэгдэл очлоо');
    ['fc','fg','fw','fd1','fd2','fa'].forEach(id=>e(id).value='');
    imgDataList=[];e('fileList').innerHTML='';e('amtFmt').textContent='';
  }catch(err){toast('Алдаа: '+err.message,'err');console.error(err);}
  btn.disabled=false;btn.textContent='Акт илгээх →';
  setTimeout(()=>{e('progWrap').style.display='none';e('progText').style.display='none';e('progBar').style.width='0%';},1500);
}

async function approve(docId){
  const a=acts.find(x=>x.id===docId);
  if(!a||a.status!=='pending'){toast('Батлах боломжгүй','err');return;}
  if(RSTEP[role]!==a.step){toast('Та энэ актыг батлах эрхгүй','err');return;}
  const newEvs=[...(a.evs||[]),{type:'approve',who:cu.displayName||cu.email,whoEmail:cu.email,
    title:role+' батлав',detail:cu.email+' · Google нэвтрэлтээр баталгаажсан',time:ts(),hash:gh()}];
  const ns=(a.step||0)+1;const done=ns>=4;
  const upd={step:ns,evs:newEvs};
  if(done){
    upd.status='done';
    upd.evs=[...newEvs,{type:'done',who:'Систем',title:'Бүрэн батлагдсан',
      detail:'Нягтланд мэдэгдэл очлоо',time:ts(),hash:gh()}];
  }
  try{
    await updateDoc(doc(db,'acts',docId),upd);
    if(done){
      await sendMail(CHAIN[3].email,CHAIN[3].name,a,cu.displayName||cu.email);
      toast('Бүрэн батлагдлаа — нягтланд мэдэгдэл очлоо');
    }else{
      await sendMail(CHAIN[ns].email,CHAIN[ns].name,a,cu.displayName||cu.email);
      toast(SN[ns]+' уруу дамжуулагдлаа');
    }
    rA();
  }catch(err){toast('Алдаа: '+err.message,'err');}
}

async function reject(docId){
  const a=acts.find(x=>x.id===docId);if(!a)return;
  const reason=prompt('Буцаасан шалтгаан:')||'Тодруулгатай байна';
  const newEvs=[...(a.evs||[]),{type:'reject',who:cu.displayName||cu.email,whoEmail:cu.email,
    title:role+' буцаав',detail:'Шалтгаан: '+reason,time:ts(),hash:gh()}];
  try{
    await updateDoc(doc(db,'acts',docId),{status:'rejected',evs:newEvs});
    toast('Акт буцаагдлаа');bk();
  }catch(err){toast('Алдаа: '+err.message,'err');}
}

function evH(ev,isLast){
  const isApprove=ev.type==='approve'||ev.type==='done';
  const isReject=ev.type==='reject';
  const dotCls=isApprove?'done-dot':isReject?'reject-dot':ev.type==='submit'?'done-dot':'active-dot';
  const dotIco=isApprove?'✓':isReject?'✕':'→';
  const cardCls=isReject?'reject-card':'';
  const titleCls=isReject?'reject-title':isApprove?'done-title':'';
  return `<div class="tl-item">
    <div class="tl-spine">
      <div class="tl-dot ${dotCls}">${dotIco}</div>
      ${!isLast?'<div class="tl-line"></div>':''}
    </div>
    <div class="tl-body">
      <div class="tl-card ${cardCls}">
        <div class="tl-who">${esc(ev.who)} · ${esc(ev.whoEmail||'')} · ${ev.time||''}</div>
        <div class="tl-title ${titleCls}">${esc(ev.title)}</div>
        <div class="tl-detail">${esc(ev.detail)}</div>
        <div class="tl-hash">🔐 ${ev.hash||''}</div>
      </div>
    </div>
  </div>`;
}

function waitEvH(i,isLast){
  return `<div class="tl-item">
    <div class="tl-spine">
      <div class="tl-dot wait-dot">${i+1}</div>
      ${!isLast?'<div class="tl-line"></div>':''}
    </div>
    <div class="tl-body">
      <div class="tl-wait-card">
        <div class="tl-who">Хүлээгдэж байна</div>
        <div class="tl-title">${SN[i]}</div>
      </div>
    </div>
  </div>`;
}

function detH(idx){
  const a=acts[idx];if(!a)return '';
  const p=pct(a);const step=a.step||0;
  const canA=a.status==='pending'&&role!=='Гүйцэтгэгч'&&RSTEP[role]===step;
  const dr=a.dateFrom&&a.dateTo?a.dateFrom+' — '+a.dateTo:a.dateFrom||a.dateTo||'—';

  const imgsHtml=a.images&&a.images.length?`
    <div class="img-section">
      <div class="img-section-label">ХАВСАРГАСАН ФАЙЛУУД</div>
      <div class="img-grid">${a.images.map(img=>img.isPdf
        ?`<div class="pdf-thumb" onclick="window.open('${img.base64}')"><span>📄</span><small>${esc(img.name)}</small></div>`
        :`<img class="img-thumb" src="${img.base64}" onclick="openLb('${img.base64}')" loading="lazy">`
      ).join('')}</div>
    </div>`:''

  let tl=(a.evs||[]).map((ev,i,arr)=>evH(ev,i===arr.length-1&&a.status!=='pending')).join('');
  if(a.status==='pending'){
    const remaining=[];
    for(let i=step;i<4;i++)remaining.push(i);
    remaining.forEach((ri,j)=>tl+=waitEvH(ri,j===remaining.length-1));
  }

  return `
    <div class="detail-card">
      <div class="detail-head">
        <div>
          <div class="detail-id">${esc(a.actId)} · ${esc(a.date)}</div>
          <div class="detail-title">${esc(a.work)}</div>
        </div>
        <span class="badge ${badgeCls(a)}">${badgeTxt(a)}</span>
      </div>
      <div class="detail-body">
        <div class="info-row"><span class="info-label">Компани</span><span class="info-value">${esc(a.company)}</span></div>
        <div class="info-row"><span class="info-label">Гэрээний дугаар</span><span class="info-value">${esc(a.contract)}</span></div>
        <div class="info-row"><span class="info-label">Хугацаа</span><span class="info-value">${esc(dr)}</span></div>
        <div class="info-row"><span class="info-label">Дүн</span><span class="info-value amount-big">₮${fmtN(a.amount)}</span></div>
        <div class="info-row"><span class="info-label">Илгээсэн</span><span class="info-value">${esc(a.submittedByName||a.submittedBy)}</span></div>
        ${a.imgCount?`<div class="info-row"><span class="info-label">Файлууд</span><span class="info-value">${a.imgCount} файл</span></div>`:''}
      </div>
      <div class="progress-section">
        <div class="progress-big"><div class="progress-big-bar" style="width:${p}%"></div></div>
        <div class="progress-labels"><span>${p}% гүйцэтгэгдсэн</span><span>${step}/4 батлалт</span></div>
      </div>
      ${imgsHtml}
      ${canA?`<div class="approve-section">
        <button class="btn-approve" onclick="approve('${a.id}')">✓ Батлах</button>
        <button class="btn-reject" onclick="reject('${a.id}')">Буцаах</button>
      </div>`:''}
      <div class="timeline">
        <div class="tl-label">ЯВЦЫН АУДИТ БҮРТГЭЛ</div>
        ${tl}
      </div>
    </div>`;
}

function actCardH(a,idx,from){
  const p=pct(a);
  return `<div class="act-card" onclick="opd(${idx},${from})">
    <div class="act-card-head">
      <div>
        <div class="act-card-id">${esc(a.actId)} · ${esc(a.date)}</div>
        <div class="act-card-title">${esc(a.work)}</div>
      </div>
      <span class="badge ${badgeCls(a)}">${badgeTxt(a)}</span>
    </div>
    <div class="act-card-meta">${esc(a.company)} · ₮${fmtN(a.amount)}</div>
    <div class="act-card-footer">
      <div class="progress-mini"><div class="progress-mini-bar" style="width:${p}%"></div></div>
      <span class="progress-pct">${p}%</span>
    </div>
  </div>`;
}

function rA(){
  const el=e('al');
  if(role==='Гүйцэтгэгч'){el.innerHTML='<div class="empty"><span class="empty-icon">📤</span><div class="empty-text">Акт илгээх таб ашиглана уу</div></div>';return;}
  const list=role==='Нягтлан'
    ?acts.filter(a=>a.status==='done')
    :acts.filter(a=>a.status==='pending'&&(a.step||0)===RSTEP[role]);
  el.innerHTML=list.length
    ?list.map(a=>actCardH(a,acts.indexOf(a),1)).join('')
    :'<div class="empty"><span class="empty-icon">✓</span><div class="empty-text">Батлах акт байхгүй байна</div></div>';
}
function rL(){
  const el=e('ll');
  el.innerHTML=acts.length
    ?acts.map((a,i)=>actCardH(a,i,2)).join('')
    :'<div class="empty"><span class="empty-icon">📂</span><div class="empty-text">Акт байхгүй байна</div></div>';
}

function rD(){
  e('s0').textContent=acts.length;
  e('s1').textContent=acts.filter(a=>a.status==='pending').length;
  e('s2').textContent=acts.filter(a=>a.status==='done').length;
  e('dl').innerHTML=acts.length?acts.map((a,i)=>actCardH(a,i,3)).join(''):'';
  setTimeout(rCharts,60);
}

function rCharts(){
  if(!window.Chart)return;
  const done=acts.filter(a=>a.status==='done').length;
  const rej=acts.filter(a=>a.status==='rejected').length;
  const pend=acts.filter(a=>a.status==='pending').length;

  Chart.defaults.font.family="'DM Sans', sans-serif";
  Chart.defaults.color='#6b6960';

  if(statusChartInst)statusChartInst.destroy();
  const sc=e('statusChart');
  if(sc)statusChartInst=new Chart(sc,{
    type:'doughnut',
    data:{labels:['Батлагдсан','Явцад','Буцаагдсан'],
      datasets:[{data:[done,pend,rej],
        backgroundColor:['#1d7a5f','#1a4fa0','#991c1c'],
        borderWidth:0,hoverOffset:3}]},
    options:{plugins:{legend:{position:'bottom',labels:{font:{size:12},padding:16,boxWidth:10,boxHeight:10}}},cutout:'68%'}
  });

  const sc2=[0,0,0,0];
  acts.filter(a=>a.status==='pending').forEach(a=>{const s=a.step||0;if(s<4)sc2[s]++;});
  if(stepsChartInst)stepsChartInst.destroy();
  const bc=e('stepsChart');
  if(bc)stepsChartInst=new Chart(bc,{
    type:'bar',
    data:{labels:['Координатор','Инженер','Захирал','Нягтлан'],
      datasets:[{label:'Хүлээж буй',data:sc2,
        backgroundColor:'#1a1915',borderRadius:4,borderSkipped:false}]},
    options:{plugins:{legend:{display:false}},
      scales:{y:{beginAtZero:true,ticks:{stepSize:1},grid:{color:'#e8e6df'}},
        x:{grid:{display:false}}}}
  });

  const compMap={};
  acts.forEach(a=>{compMap[a.company]=(compMap[a.company]||0)+parseInt(a.amount||0);});
  const comps=Object.keys(compMap).slice(0,6);
  if(amountChartInst)amountChartInst.destroy();
  const ac=e('amountChart');
  if(ac)amountChartInst=new Chart(ac,{
    type:'bar',
    data:{labels:comps,
      datasets:[{label:'Дүн',data:comps.map(c=>compMap[c]),
        backgroundColor:'#1a1915',borderRadius:4,borderSkipped:false}]},
    options:{indexAxis:'y',plugins:{legend:{display:false}},
      scales:{x:{beginAtZero:true,ticks:{callback:v=>'₮'+Math.round(v/1000000)+'М'},grid:{color:'#e8e6df'}},
        y:{grid:{display:false}}}}
  });
}
</script>
</body>
</html>
